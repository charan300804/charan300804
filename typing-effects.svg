<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 60" width="100%" height="60">
  <defs>
    <!-- Role Gradient: Vibrant Purple-Indigo-Pink -->
    <linearGradient id="role-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="50%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#F472B6" />
    </linearGradient>
    
    <!-- Description Gradient: Cyber Cyan-Blue-Emerald -->
    <linearGradient id="desc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <!-- Clip Paths for Typewriter Reveal using SMIL animations -->
    <clipPath id="clip1">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;800;800;0;0" keyTimes="0;0.07;0.16;0.19;1" dur="20s" begin="0s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;800;800;0;0" keyTimes="0;0.07;0.16;0.19;1" dur="20s" begin="4s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;800;800;0;0" keyTimes="0;0.07;0.16;0.19;1" dur="20s" begin="8s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="clip4">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;800;800;0;0" keyTimes="0;0.07;0.16;0.19;1" dur="20s" begin="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="clip5">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;800;800;0;0" keyTimes="0;0.07;0.16;0.19;1" dur="20s" begin="16s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      
      .text-line {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 24px;
        fill: #FFFFFF;
      }
      
      .role-text {
        font-weight: 800;
        fill: url(#role-grad);
      }
      
      .bullet {
        fill: #475569;
        font-size: 22px;
      }
      
      .desc-text {
        font-weight: 600;
        fill: url(#desc-grad);
      }
    </style>
  </defs>

  <!-- Line 1 -->
  <g clip-path="url(#clip1)">
    <text x="400" y="38" text-anchor="middle" class="text-line" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.005;0.195;0.2;1" dur="20s" begin="0s" repeatCount="indefinite" />
      <tspan class="role-text">AI / ML Engineer</tspan>
      <tspan class="bullet"> • </tspan>
      <tspan class="desc-text">Exploring cutting-edge GenAI models 🧠</tspan>
    </text>
  </g>

  <!-- Line 2 -->
  <g clip-path="url(#clip2)">
    <text x="400" y="38" text-anchor="middle" class="text-line" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.005;0.195;0.2;1" dur="20s" begin="4s" repeatCount="indefinite" />
      <tspan class="role-text">App Developer</tspan>
      <tspan class="bullet"> • </tspan>
      <tspan class="desc-text">Building intelligent &amp; high-performance apps 📱</tspan>
    </text>
  </g>

  <!-- Line 3 -->
  <g clip-path="url(#clip3)">
    <text x="400" y="38" text-anchor="middle" class="text-line" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.005;0.195;0.2;1" dur="20s" begin="8s" repeatCount="indefinite" />
      <tspan class="role-text">Full-Stack Developer</tspan>
      <tspan class="bullet"> • </tspan>
      <tspan class="desc-text">Crafting premium, responsive web experiences 🌐</tspan>
    </text>
  </g>

  <!-- Line 4 -->
  <g clip-path="url(#clip4)">
    <text x="400" y="38" text-anchor="middle" class="text-line" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.005;0.195;0.2;1" dur="20s" begin="12s" repeatCount="indefinite" />
      <tspan class="role-text">Python Developer</tspan>
      <tspan class="bullet"> • </tspan>
      <tspan class="desc-text">Writing clean, optimized, &amp; robust code 🐍</tspan>
    </text>
  </g>

  <!-- Line 5 -->
  <g clip-path="url(#clip5)">
    <text x="400" y="38" text-anchor="middle" class="text-line" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.005;0.195;0.2;1" dur="20s" begin="16s" repeatCount="indefinite" />
      <tspan class="role-text">Vibe Coder</tspan>
      <tspan class="bullet"> • </tspan>
      <tspan class="desc-text">Translating inspiration &amp; flow into digital art 💻</tspan>
    </text>
  </g>
</svg>
